name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

      - run: npm test

      - name: Build
        run: npm run build
        env:
          LOCAL_POSTGRES_URL: postgresql://user:pass@localhost:5432/bdi
          AUTH_SECRET: ci-test-secret
          GOOGLE_CLIENT_ID: ci-test
          GOOGLE_CLIENT_SECRET: ci-test
