name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        brand: [bdi, cmbd]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

      - run: npm test

      - name: Build (${{ matrix.brand }})
        run: npm run build
        env:
          BRAND: ${{ matrix.brand }}
          NEXT_PUBLIC_BRAND: ${{ matrix.brand }}
          POSTGRES_URL: postgresql://user:pass@localhost:5432/bd_platform
          AUTH_SECRET: ci-test-secret
          GOOGLE_CLIENT_ID: ci-test
          GOOGLE_CLIENT_SECRET: ci-test
