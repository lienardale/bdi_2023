services:
  postgres:
    container_name: bdi-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - bdi_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: test_postgres

volumes:
  bdi_pgdata:
